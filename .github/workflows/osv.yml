name: OSV Scan

on:
  pull_request:
  schedule:
    - cron: "23 9 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  osv:
    name: Advisory dependency scan
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.8
    with:
      scan-args: |-
        --recursive
        .
      fail-on-vuln: false

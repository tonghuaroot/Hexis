services:
  db:
    build:
      context: .
      dockerfile: ops/Dockerfile.db
    container_name: hexis_brain
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hexis_memory}
      POSTGRES_USER: ${POSTGRES_USER:-hexis_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hexis_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # db/*.sql is baked into the image (see Dockerfile) to avoid bind-mount issues on macOS external drives.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hexis_user} -d ${POSTGRES_DB:-hexis_memory}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "${HEXIS_BIND_ADDRESS:-127.0.0.1}:${POSTGRES_PORT:-43815}:5432"
    # Need to modify search_path for AGE to work seamlessly
    command:
      - postgres
      - -c
      - search_path=ag_catalog,public
      # AGE tuning (see docs/optimize.md): a Cypher query compiles to many
      # per-row agtype expressions, so PostgreSQL's JIT usually costs more to
      # compile than it saves -> turn it off. Lower random_page_cost so the
      # planner actually picks the edge-endpoint / property indexes on SSD/NVMe.
      - -c
      - jit=off
      - -c
      - random_page_cost=1.1
      - -c
      - app.embedding_dimension=${EMBEDDING_DIMENSION:-768}
      - -c
      - app.embedding_service_url=${EMBEDDING_SERVICE_URL:-http://host.docker.internal:11434/api/embed}
      - -c
      - app.embedding_model_id=${EMBEDDING_MODEL_ID:-embeddinggemma:300m-qat-q4_0}
    networks:
      - public
      - private

  rabbitmq:
    image: rabbitmq:4-management
    container_name: hexis_rabbitmq
    profiles:
      - active
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-hexis}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-hexis_password}
    ports:
      - "${HEXIS_BIND_ADDRESS:-127.0.0.1}:${RABBITMQ_PORT:-45672}:5672"
      - "${HEXIS_BIND_ADDRESS:-127.0.0.1}:${RABBITMQ_MANAGEMENT_PORT:-45673}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - public
      - private

  # Embeddings are provided by Ollama running on the host (default).
  # The DB connects to Ollama via host.docker.internal:11434.
  # To use HuggingFace TEI instead, uncomment the service below and set:
  #   EMBEDDING_SERVICE_URL=http://embeddings:80/embed
  #
  # embeddings:
  #   image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.8
  #   container_name: hexis_embeddings
  #   platform: linux/amd64
  #   command:
  #     - --model-id
  #     - ${EMBEDDING_MODEL_ID:-unsloth/embeddinggemma-300m}
  #     - --dtype
  #     - float32
  #   environment:
  #     EMBEDDING_MODEL_ID: ${EMBEDDING_MODEL_ID:-unsloth/embeddinggemma-300m}
  #     EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-768}
  #     HF_HOME: /data
  #     HUGGINGFACE_HUB_CACHE: /data
  #   expose:
  #     - "80"
  #   volumes:
  #     - ${EMBEDDINGS_CACHE_DIR:-/tmp/hexis_embeddings_cache}:/data
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:80/health"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #     start_period: 60s
  #   networks:
  #     - private
  #     - public

  heartbeat_worker:
    build:
      context: .
      dockerfile: ops/Dockerfile.worker
    container_name: hexis_heartbeat_worker
    profiles:
      - active
    command: ["hexis-worker", "--mode", "heartbeat"]
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-hexis_memory}
      POSTGRES_USER: ${POSTGRES_USER:-hexis_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hexis_password}
      EMBEDDING_MODEL_ID: ${EMBEDDING_MODEL_ID:-unsloth/embeddinggemma-300m}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-768}
      RABBITMQ_MANAGEMENT_URL: http://rabbitmq:15672
      RABBITMQ_USER: ${RABBITMQ_DEFAULT_USER:-hexis}
      RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-hexis_password}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
      HEXIS_LLM_CONSCIOUS_API_KEY: ${HEXIS_LLM_CONSCIOUS_API_KEY:-}
      HEXIS_LLM_SUBCONSCIOUS_API_KEY: ${HEXIS_LLM_SUBCONSCIOUS_API_KEY:-}
    networks:
      - private
      - public

  maintenance_worker:
    build:
      context: .
      dockerfile: ops/Dockerfile.worker
    container_name: hexis_maintenance_worker
    profiles:
      - active
    command: ["hexis-worker", "--mode", "maintenance"]
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-hexis_memory}
      POSTGRES_USER: ${POSTGRES_USER:-hexis_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hexis_password}
      EMBEDDING_MODEL_ID: ${EMBEDDING_MODEL_ID:-unsloth/embeddinggemma-300m}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-768}
      RABBITMQ_MANAGEMENT_URL: http://rabbitmq:15672
      RABBITMQ_USER: ${RABBITMQ_DEFAULT_USER:-hexis}
      RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-hexis_password}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
      HEXIS_LLM_CONSCIOUS_API_KEY: ${HEXIS_LLM_CONSCIOUS_API_KEY:-}
      HEXIS_LLM_SUBCONSCIOUS_API_KEY: ${HEXIS_LLM_SUBCONSCIOUS_API_KEY:-}
    networks:
      - private
      - public

  api:
    build:
      context: .
      dockerfile: ops/Dockerfile.worker
    container_name: hexis_api
    profiles:
      - active
    command: ["hexis-api", "--host", "0.0.0.0", "--port", "43817"]
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${HEXIS_BIND_ADDRESS:-127.0.0.1}:${HEXIS_API_PORT:-43817}:43817"
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-hexis_memory}
      POSTGRES_USER: ${POSTGRES_USER:-hexis_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hexis_password}
      EMBEDDING_MODEL_ID: ${EMBEDDING_MODEL_ID:-unsloth/embeddinggemma-300m}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-768}
      HEXIS_CORS_ORIGINS: ${HEXIS_CORS_ORIGINS:-http://localhost:3477,http://localhost:3000}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
      HEXIS_LLM_CONSCIOUS_API_KEY: ${HEXIS_LLM_CONSCIOUS_API_KEY:-}
      HEXIS_LLM_SUBCONSCIOUS_API_KEY: ${HEXIS_LLM_SUBCONSCIOUS_API_KEY:-}
    networks:
      - private
      - public

  channel_worker:
    build:
      context: .
      dockerfile: ops/Dockerfile.channels
    container_name: hexis_channel_worker
    profiles:
      - active
    command: ["hexis-channels"]
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-hexis_memory}
      POSTGRES_USER: ${POSTGRES_USER:-hexis_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hexis_password}
      EMBEDDING_MODEL_ID: ${EMBEDDING_MODEL_ID:-unsloth/embeddinggemma-300m}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-768}
      RABBITMQ_MANAGEMENT_URL: http://rabbitmq:15672
      RABBITMQ_USER: ${RABBITMQ_DEFAULT_USER:-hexis}
      RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-hexis_password}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN:-}
      SIGNAL_PHONE_NUMBER: ${SIGNAL_PHONE_NUMBER:-}
      SIGNAL_API_URL: ${SIGNAL_API_URL:-http://signal-cli:8080}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN:-hexis_verify}
      IMESSAGE_API_URL: ${IMESSAGE_API_URL:-}
      IMESSAGE_PASSWORD: ${IMESSAGE_PASSWORD:-}
      MATRIX_HOMESERVER: ${MATRIX_HOMESERVER:-}
      MATRIX_ACCESS_TOKEN: ${MATRIX_ACCESS_TOKEN:-}
      MATRIX_USER_ID: ${MATRIX_USER_ID:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
      HEXIS_LLM_CONSCIOUS_API_KEY: ${HEXIS_LLM_CONSCIOUS_API_KEY:-}
      HEXIS_LLM_SUBCONSCIOUS_API_KEY: ${HEXIS_LLM_SUBCONSCIOUS_API_KEY:-}
    networks:
      - private
      - public

  signal-cli:
    image: bbernhard/signal-cli-rest-api:latest
    container_name: hexis_signal_cli
    profiles:
      - signal
    environment:
      MODE: native
    volumes:
      - signal_data:/home/.local/share/signal-cli
    expose:
      - "8080"
    networks:
      - private

  browser:
    image: ghcr.io/browserless/chromium:latest
    container_name: hexis_browser
    profiles:
      - browser
    ports:
      - "${HEXIS_BIND_ADDRESS:-127.0.0.1}:${BROWSER_CDP_PORT:-49222}:3000"
    environment:
      TIMEOUT: 60000
      CONCURRENT: 5
    networks:
      - private

volumes:
  postgres_data:
  rabbitmq_data:
  signal_data:

networks:
  private:
    internal: true
  public:
